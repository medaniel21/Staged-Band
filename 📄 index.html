<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Band</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a001f, #000);
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 0.2em;
      margin: 0;
    }

    p {
      opacity: 0.7;
      margin-top: 10px;
    }

    .section {
      padding: 60px 20px;
    }

    iframe {
      border: none;
      border-radius: 10px;
    }

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    .nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      opacity: 0.8;
    }

    .nav a:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="#music">Music</a>
  <a href="#shows">Shows</a>
  <a href="#contact">Contact</a>
</div>

<section class="hero">
  <h1>YOUR BAND</h1>
  <p>dark pop metal / ambient energy</p>
</section>

<section id="music" class="section">
  <h2>Music</h2>
  <iframe src="https://open.spotify.com/embed/track/11dFghVXANMlKmJXsNCbNl" width="300" height="80"></iframe>
</section>

<section id="shows" class="section">
  <h2>Shows</h2>
  <p>Dec 2026 — Viper Room — Los Angeles</p>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <p>yourband@email.com</p>
</section>

</body>
</html>
